{% extends 'base.html' %}

{% block title %}Dashboard - Support System{% endblock %}

{% block content %}
<div class="row text-center mb-5 mt-4">
    <div class="col-md-3">
        <div class="card shadow-sm p-3">
            <h5>Total Tickets</h5>
            <h2 class="text-primary">{{ total_tickets }}</h2>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card shadow-sm p-3 border-info">
            <h5>Open</h5>
            <h2 class="text-info">{{ open_tickets }}</h2>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card shadow-sm p-3 border-success">
            <h5>Resolved</h5>
            <h2 class="text-success">{{ resolved_tickets }}</h2>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card shadow-sm p-3 border-danger">
            <h5>High Priority</h5>
            <h2 class="text-danger">{{ high_priority_tickets }}</h2>
        </div>
    </div>
</div>

<div class="d-grid gap-3 d-md-flex justify-content-md-center mt-5">
    <a href="{% url 'ticket_list' %}" class="btn btn-dark btn-lg px-5 shadow">View All Tickets</a>
    <a href="{% url 'create_ticket' %}" class="btn btn-primary btn-lg px-5 shadow">Create New Ticket</a>
</div>
{% endblock %}
